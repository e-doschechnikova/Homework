<!DOCTYPE html>
<html lang="ru">
  <head>
    <title> Authorization form</title>
    <meta http-equiv="Content-type" content="text/html;charset=UTF-8" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container"> 
    <div class="containerHeader"
    <form action="#" method="post" enctype="multipart/form-data"></form>
    <h class="header"
      >LOG IN or
      <a class="header-blank"
        target="blank"
        href="http://192.168.1.245:5500/%D1%84%D0%BE%D1%80%D0%BC%D0%B0%20%D0%B4%D0%BE%D0%BC%D0%B0%D1%88%D0%BA%D0%B0.html"
      >
        SIGN UP
      </a>
    </h> 
    <div>
      <p class="name">USERNAME</p>
      <input class="name-input"
        tabindex="1"
        placeholder="username"
        type="email"
        name="username"
        value=""
      />
  
    <div>
      <p class="pass">PASSWORD</p>
      <input class="pass-input"
        tabindex="2"
        placeholder="password"
        type="password"
        name="userpass"
        value=""
      />
    </div>
    <div>
      <p>
        <a class="lostpass"
          target="blank2"
          href="http://192.168.1.245:5500/%D1%84%D0%BE%D1%80%D0%BC%D0%B0%20%D0%B4%D0%BE%D0%BC%D0%B0%D1%88%D0%BA%D0%B0.html"
        >
          Lost your password?
        </a>
      </p>
    </div>
    <div>
      <button class="login" type="submit">LOG IN</button>
        <a class="loginwith" target="blank3" href="https://twitter.com/?lang=ru">
          LOGIN WITH Twitter
        </a>  
    </div>
  </div>
</div>
  </body>
</html>
